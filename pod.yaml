 apiVersion: apps/v1
 kind: Deployment
 metadata:
   name: nginx
 spec:
   replicas: 2
   selector:
     matchLabels:
       name: nginx
   template:
      metadata: 
         matchLabels:
           name: nginx
       spec: 
         containers:
           - name: nginx
             image: nginx
             ports:
               - containerPort: 80